<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}FoodHoreca Portal{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-success mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="bi bi-basket3"></i> FoodHoreca Portal</a>
        <div class="navbar-nav me-auto">
            <a class="nav-link" href="/">Dashboard</a>
            <a class="nav-link" href="/catalogo">Catalogo</a>
            <a class="nav-link" href="/ordini">Ordini</a>
        </div>
        <div class="navbar-nav">
            <span class="navbar-text text-white-50 me-3">Agente: Mario Rossi</span>
            <a class="nav-link position-relative" href="/carrello">
                <i class="bi bi-cart3 fs-5"></i>
                {% if cart_count %}
                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-warning text-dark">{{ cart_count }}</span>
                {% endif %}
            </a>
        </div>
    </div>
</nav>
<div class="container pb-5">
    {% block content %}{% endblock %}
</div>
<footer class="text-center text-muted py-4 small">
    Demo a scopo dimostrativo &middot; dati fittizi &middot; Python / FastAPI / MySQL
</footer>
</body>
</html>
